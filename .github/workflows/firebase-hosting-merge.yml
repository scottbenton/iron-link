name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment: Production
    env:
      VITE_IRON_LINK_FIREBASE_APIKEY: '${{ secrets.IRON_LINK_FIREBASE_APIKEY }}'
      VITE_IRON_LINK_FIREBASE_AUTHDOMAIN: '${{ secrets.IRON_LINK_FIREBASE_AUTHDOMAIN }}'
      VITE_IRON_LINK_FIREBASE_PROJECTID: '${{ secrets.IRON_LINK_FIREBASE_PROJECTID }}'
      VITE_IRON_LINK_FIREBASE_STORAGEBUCKET: '${{ secrets.IRON_LINK_FIREBASE_STORAGEBUCKET }}'
      VITE_IRON_LINK_FIREBASE_MESSAGINGSENDERID: '${{ secrets.IRON_LINK_FIREBASE_MESSAGINGSENDERID }}'
      VITE_IRON_LINK_FIREBASE_APPID: '${{ secrets.IRON_LINK_FIREBASE_APPID }}'
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_IRON_LINK_SCOTT_BENTON }}
          channelId: live
          projectId: iron-link-scott-benton
