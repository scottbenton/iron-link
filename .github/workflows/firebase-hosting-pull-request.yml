name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    environment: Development
    env:
      VITE_IRON_LINK_FIREBASE_APIKEY: '${{ secrets.IRON_LINK_FIREBASE_APIKEY }}'
      VITE_IRON_LINK_FIREBASE_AUTHDOMAIN: '${{ secrets.IRON_LINK_FIREBASE_AUTHDOMAIN }}'
      VITE_IRON_LINK_FIREBASE_PROJECTID: '${{ secrets.IRON_LINK_FIREBASE_PROJECTID }}'
      VITE_IRON_LINK_FIREBASE_STORAGEBUCKET: '${{ secrets.IRON_LINK_FIREBASE_STORAGEBUCKET }}'
      VITE_IRON_LINK_FIREBASE_MESSAGINGSENDERID: '${{ secrets.IRON_LINK_FIREBASE_MESSAGINGSENDERID }}'
      VITE_IRON_LINK_FIREBASE_APPID: '${{ secrets.IRON_LINK_FIREBASE_APPID }}'
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_IRON_LINK_DEV }}
          projectId: '${{ secrets.IRON_LINK_FIREBASE_PROJECTID }}'
  deploy_firestore_and_storage_rules:
    name: Deploy Firestore and Storage rules and indexes
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v2
      - uses: w9jds/firebase-action@v13.5.2
        with:
          args: deploy --only firestore
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_IRON_LINK_DEV }}
          PROJECT_ID: '${{secrets.IRON_LINK_FIREBASE_PROJECTID}}'
      - uses: w9jds/firebase-action@v13.5.2
        with:
          args: deploy --only storage
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_IRON_LINK_DEV }}
          PROJECT_ID: '${{secrets.IRON_LINK_FIREBASE_PROJECTID}}'
